services:
  control-tension-server:
    image: ghcr.io/el-rocho/ata-elrocho-selhosted:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: control-tension-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3000
      - DATA_DIR=/app/data
      - TZ=Europe/Madrid
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/settings"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
